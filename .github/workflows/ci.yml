name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    # Skeleton workflow: expects a runner image with `terra` already installed.
    # Adjust `runs-on` and setup steps if you want to use a GitHub-hosted runner.
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show tool versions
        run: |
          terra -v
          make --version | head -n 1

      - name: Run tests
        run: make test

      - name: Check generated ASDL snapshot
        run: make check
